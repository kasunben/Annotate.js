services:
  annotate:
    image: ghcr.io/kasunben/annotate.js:latest
    build: .  # remove this line to use the pre-built image from GHCR
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - annotate_data:/app/server/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  annotate_data:
